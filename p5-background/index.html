<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Las: p5.js Background Study</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #071008;
        color: #ecf4e8;
        font-family: "IBM Plex Mono", "Courier New", monospace;
      }

      body {
        overflow: hidden;
      }

      #background-demo {
        position: fixed;
        inset: 0;
        background: url("../las_tlo.png") center / cover no-repeat;
      }

      .demo-panel {
        position: fixed;
        left: 1rem;
        bottom: 1rem;
        width: min(25rem, calc(100vw - 2rem));
        padding: 1rem;
        border: 1px solid rgba(197, 234, 188, 0.2);
        border-radius: 1rem;
        background: rgba(7, 14, 9, 0.42);
        backdrop-filter: blur(14px);
        box-shadow: 0 18px 34px -28px rgba(0, 0, 0, 0.8);
      }

      .demo-panel h1 {
        margin: 0 0 0.75rem;
        font-size: 0.92rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .demo-panel p {
        margin: 0;
        color: rgba(237, 245, 234, 0.78);
        font-size: 0.83rem;
        line-height: 1.55;
      }

      .demo-switcher {
        display: flex;
        flex-wrap: wrap;
        gap: 0.6rem;
        margin-top: 0.9rem;
      }

      .demo-switcher button {
        padding: 0.64rem 0.75rem;
        border: 1px solid rgba(185, 224, 175, 0.2);
        border-radius: 999px;
        background: rgba(9, 19, 11, 0.4);
        color: inherit;
        cursor: pointer;
      }

      .demo-switcher button.is-current {
        border-color: rgba(223, 255, 214, 0.75);
        background: rgba(22, 36, 22, 0.65);
      }
    </style>
    <script src="../vendor/p5.min.js?v=1" defer></script>
    <script src="../background-core.js?v=6" defer></script>
    <script src="sketch.js?v=6" defer></script>
  </head>
  <body>
    <div id="background-demo" aria-hidden="true"></div>

    <section class="demo-panel">
      <h1>p5.js Background Study</h1>
      <p>
        Oddzielne demo samej animacji tła. Pętla trwa około 10 sekund i wraca do
        punktu wyjścia, a klawisze 1, 2 i 3 przełączają intensywność wariantów.
      </p>
      <div class="demo-switcher" aria-label="Warianty tła">
        <button type="button" class="is-current" data-variant="natural">Subtelna</button>
        <button type="button" data-variant="mist">Organiczna</button>
        <button type="button" data-variant="glitch">Eksperymentalna</button>
      </div>
    </section>
  </body>
</html>
